name: Deploy to GitHub Pages


on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: .env
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      SITE_LANGUAGE: ${{ secrets.SITE_LANGUAGE }}
      SITE_TITLE: ${{ secrets.SITE_TITLE }}
      SITE_DESCRIPTION: ${{ secrets.SITE_DESCRIPTION }}
      SITE_AUTHOR_NAME: ${{ secrets.SITE_AUTHOR_NAME }}
      SITE_AUTHOR_TITLE: ${{ secrets.SITE_AUTHOR_TITLE }}
      SITE_AUTHOR_BIO: ${{ secrets.SITE_AUTHOR_BIO }}
      SITE_AUTHOR_EMAIL: ${{ secrets.SITE_AUTHOR_EMAIL }}
      SITE_AUTHOR_LOCATION: ${{ secrets.SITE_AUTHOR_LOCATION }}
      SOCIAL_GITHUB: ${{ secrets.SOCIAL_GITHUB }}
      SOCIAL_LINKEDIN: ${{ secrets.SOCIAL_LINKEDIN }}
      SOCIAL_TWITTER: ${{ secrets.SOCIAL_TWITTER }}
      SOCIAL_MASTODON: ${{ secrets.SOCIAL_MASTODON }}
      SOCIAL_BLUESKY: ${{ secrets.SOCIAL_BLUESKY }}
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v5
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          node-version: 24 # The specific version of Node that should be used to build your site. Defaults to 20. (optional)
          # package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
